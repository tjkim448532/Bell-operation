# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create env file
        run: |
          echo "NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}" >> .env.production
          echo "M2M_API_TOKEN=${{ secrets.M2M_API_TOKEN }}" >> .env.production
      - run: npm ci
      - name: Suppress npm warnings
        run: |
          echo "NPM_CONFIG_LOGLEVEL=silent" >> $GITHUB_ENV
          echo "NPM_CONFIG_FUND=false" >> $GITHUB_ENV
          echo "NPM_CONFIG_UPDATE_NOTIFIER=false" >> $GITHUB_ENV
      - run: npm install -g firebase-tools
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BELL_OPERATION }}
          channelId: live
          projectId: bell-operation
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
