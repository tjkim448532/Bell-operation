# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Suppress npm warnings
        run: |
          echo "NPM_CONFIG_LOGLEVEL=silent" >> $GITHUB_ENV
          echo "NPM_CONFIG_FUND=false" >> $GITHUB_ENV
          echo "NPM_CONFIG_UPDATE_NOTIFIER=false" >> $GITHUB_ENV
      - name: Create env file
        run: |
          echo "NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}" >> .env.production
          echo "M2M_API_TOKEN=${{ secrets.M2M_API_TOKEN }}" >> .env.production
      - run: npm ci
      - run: npm install -g firebase-tools
      - run: npm run build
      - name: Deploy to Firebase Hosting Preview
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BELL_OPERATION }}' > firebase-service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS="$(pwd)/firebase-service-account.json"
          npx firebase-tools@latest deploy --only hosting --project bell-operation --non-interactive
